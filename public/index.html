<!DOCTYPE html>
<html>
<head>
    <title>The Fundraiser — A Nonprofit Survival Platformer</title>
    <link rel="stylesheet" href="/css/main.css"/>
    <script type="module" src="/js/main.js"></script>
</head>
<body>
    <canvas id="screen" width="256" height="240" class="aspect-4-3"></canvas>
    <div id="start-overlay">
        <div class="title">THE FUNDRAISER</div>
        <div class="subtitle">A Nonprofit Survival Platformer</div>
        <div class="controls">
            <div>Arrow Keys — Move</div>
            <div>Space — Jump</div>
            <div>Shift — Run</div>
            <div>Z — Throw Letter (after power-up)</div>
        </div>
        <div class="prompt">Click anywhere to start</div>
        <div class="credit">Powered by Dataro AI</div>
    </div>
</body>
</html>
