<!DOCTYPE html>
<html>
<head>
    <title>The Fundraiser — A Nonprofit Survival Platformer</title>
    <link rel="stylesheet" href="/css/main.css"/>
    <script type="module" src="/js/main.js"></script>
</head>
<body>
    <canvas id="screen" width="256" height="240" class="aspect-4-3"></canvas>
    <div id="start-overlay">
        <div class="title">THE FUNDRAISER</div>
        <div class="subtitle">A Nonprofit Survival Platformer</div>
        <div class="tagline">Survive the quarter. Retain your donors. Find the Dataro power-up.</div>
        <div class="controls">
            <div class="control-row"><span class="key">Arrow Keys</span> Move</div>
            <div class="control-row"><span class="key">Space</span> Jump</div>
            <div class="control-row"><span class="key">Shift</span> Run</div>
            <div class="control-row"><span class="key">Z</span> Throw Letter (after Dataro power-up)</div>
        </div>
        <div class="donor-legend">
            <div class="legend-item"><span class="dot dot-teal"></span> Small Donor ($25)</div>
            <div class="legend-item"><span class="dot dot-gold"></span> Mid Donor ($100)</div>
            <div class="legend-item"><span class="dot dot-crimson"></span> Major Donor ($1K)</div>
        </div>
        <div class="prompt">Click anywhere to start</div>
        <div class="credit">Powered by <span class="dataro-text">Dataro AI</span></div>
    </div>
</body>
</html>
