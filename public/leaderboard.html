<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard · Super Datario</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* main.css sets html, body { overflow: hidden; height: 100% } globally
           for the in-game canvas. /leaderboard is a long scrollable page,
           so we re-enable scrolling for both elements here. */
        html { overflow: auto; height: auto; }
        body.leaderboard-page {
            margin: 0;
            padding: 48px 56px;
            background: var(--darker);
            color: var(--white);
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            height: auto;
            overflow: auto;
            display: block;
        }

        .lb-back-link {
            position: fixed;
            top: 24px;
            right: 32px;
            color: var(--dataro-purple-light);
            font-size: 0.95rem;
            text-decoration: none;
            letter-spacing: 1px;
            font-weight: 600;
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid rgba(155, 111, 208, 0.3);
            background: rgba(155, 111, 208, 0.08);
            transition: all 0.2s ease;
            z-index: 10;
        }
        .lb-back-link:hover,
        .lb-back-link:focus-visible {
            background: rgba(155, 111, 208, 0.18);
            border-color: rgba(155, 111, 208, 0.5);
            color: var(--white);
        }

        .lb-hero {
            text-align: center;
            margin-bottom: 28px;
        }

        .lb-hero .dataro-badge { margin-bottom: 14px; }

        /* SUPER DATARIO at ~half the splash size (splash uses clamp(3.5rem, 9vw, 7rem)). */
        .lb-game-title {
            font-family: var(--font-display);
            font-size: clamp(1.75rem, 4.5vw, 3.5rem);
            font-weight: 900;
            letter-spacing: 4px;
            margin: 8px 0 0;
            background: linear-gradient(135deg, var(--dataro-purple-light) 0%, var(--white) 35%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 2px 12px var(--dataro-purple-glow));
        }

        .lb-section-title {
            font-family: var(--font-display);
            font-size: clamp(1.5rem, 3vw, 2.8rem);
            letter-spacing: 8px;
            text-align: center;
            color: var(--dataro-purple-light);
            margin: 40px 0 20px;
            text-transform: uppercase;
        }

        .lb-table-wrap {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Today / All Time toggle, top-right of the table */
        .lb-table-controls {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 12px;
        }
        .lb-toggle {
            display: inline-flex;
            background: rgba(107, 63, 160, 0.12);
            border: 1px solid rgba(155, 111, 208, 0.25);
            border-radius: 999px;
            padding: 4px;
        }
        .lb-toggle-btn {
            background: transparent;
            color: var(--gray-light);
            border: none;
            padding: 8px 18px;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 999px;
            transition: all 0.2s ease;
        }
        .lb-toggle-btn.active {
            background: var(--dataro-purple-light);
            color: var(--darker);
        }
        .lb-toggle-btn:not(.active):hover {
            color: var(--white);
        }

        .lb-table {
            width: 100%;
            border-collapse: collapse;
            font-size: clamp(1rem, 1.4vw, 1.6rem);
        }
        .lb-table th,
        .lb-table td {
            padding: 14px 18px;
            text-align: left;
            border-bottom: 1px solid rgba(155, 111, 208, 0.2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .lb-table th {
            color: var(--dataro-purple-light);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: clamp(0.75rem, 1vw, 1rem);
            font-weight: 700;
        }
        .lb-table td.col-rank {
            color: var(--gold);
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            width: 6ch;
        }
        .lb-table td.col-score {
            color: var(--gold);
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            text-align: right;
        }
        .lb-table th.col-score { text-align: right; }
        .lb-table tr:hover td { background: rgba(155, 111, 208, 0.05); }
        .lb-table td.is-empty { color: var(--gray); }

        .lb-empty {
            padding: 40px;
            color: var(--gray);
            text-align: center;
        }
    </style>
</head>
<body class="leaderboard-page">
    <a href="/" class="lb-back-link">← Back to Game</a>

    <div class="lb-hero">
        <div class="dataro-badge">
            <img src="/images/dataro-logo.png" alt="Dataro" class="dataro-logo-img" />
        </div>
        <div class="splash-presents">presents</div>
        <h1 class="lb-game-title">SUPER DATARIO</h1>
    </div>

    <h2 class="lb-section-title">Leaderboard</h2>

    <div class="lb-table-wrap">
        <div class="lb-table-controls">
            <div class="lb-toggle" role="tablist" aria-label="Leaderboard scope">
                <button class="lb-toggle-btn active" data-scope="today" role="tab" aria-selected="true">Today</button>
                <button class="lb-toggle-btn" data-scope="all" role="tab" aria-selected="false">All Time</button>
            </div>
        </div>

        <table class="lb-table">
            <thead>
                <tr>
                    <th class="col-rank">#</th>
                    <th class="col-first">First Name</th>
                    <th class="col-org">Organization</th>
                    <th class="col-score">Score</th>
                </tr>
            </thead>
            <tbody id="lb-body">
                <tr><td colspan="4" class="lb-empty">Loading…</td></tr>
            </tbody>
        </table>
    </div>

<script>
const esc = (s) => String(s ?? '').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[c]);

const UTM_BY_MODE = {
    event:   'https://dataro.io/?utm_source=super_datario&utm_medium=offline&utm_campaign=event-super-datario-global-2026&utm_content=game_cta',
    digital: 'https://dataro.io/?utm_source=super_datario&utm_medium=referral&utm_campaign=event-super-datario-global-2026&utm_content=game_cta',
};

async function applyMode() {
    try {
        const r = await fetch('/api/admin-settings');
        if (!r.ok) return;
        const cfg = await r.json();
        const mode = cfg.mode === 'digital' ? 'digital' : 'event';
        const utm = UTM_BY_MODE[mode];
        document.querySelectorAll('.dataro-badge').forEach(badge => {
            badge.onclick = (mode === 'digital')
                ? () => window.open(utm, '_blank', 'noopener')
                : null;
            badge.style.cursor = mode === 'digital' ? 'pointer' : '';
            badge.setAttribute('role', mode === 'digital' ? 'link' : 'img');
        });
    } catch { /* leave logo non-interactive on fetch failure */ }
}

let _scope = 'today';

async function load() {
    try {
        // /api/scores returns today's PST entries; ?all=true returns every record.
        const url = _scope === 'all' ? '/api/scores?all=true' : '/api/scores';
        const r = await fetch(url);
        if (!r.ok) return;
        const { leaderboard } = await r.json();
        render(leaderboard || []);
    } catch { /* silent; retry on next interval */ }
}

function render(entries) {
    const limit = _scope === 'all' ? 50 : 25;
    const top = [...entries].sort((a, b) => (b.score || 0) - (a.score || 0)).slice(0, limit);
    const body = document.getElementById('lb-body');
    if (!top.length) {
        const msg = _scope === 'today'
            ? 'No scores yet today. Be the first!'
            : 'No scores yet. Be the first!';
        body.innerHTML = `<tr><td colspan="4" class="lb-empty">${msg}</td></tr>`;
        return;
    }
    const cell = (val, baseClass) => val
        ? `<td class="${baseClass}">${esc(val)}</td>`
        : `<td class="${baseClass} is-empty">—</td>`;
    body.innerHTML = top.map((e, i) => {
        const score = Number(e.score) || 0;
        return `<tr>
            <td class="col-rank">#${i + 1}</td>
            ${cell(e.name, 'col-first')}
            ${cell(e.org, 'col-org')}
            <td class="col-score">$${score.toLocaleString()}</td>
        </tr>`;
    }).join('');
}

document.querySelectorAll('.lb-toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const scope = btn.dataset.scope;
        if (scope === _scope) return;
        _scope = scope;
        document.querySelectorAll('.lb-toggle-btn').forEach(b => {
            const isActive = b.dataset.scope === _scope;
            b.classList.toggle('active', isActive);
            b.setAttribute('aria-selected', isActive ? 'true' : 'false');
        });
        load();
    });
});

applyMode();
load();
setInterval(load, 30_000);
setInterval(applyMode, 60_000);   // re-check mode once a minute in case admin flips it
</script>
</body>
</html>
